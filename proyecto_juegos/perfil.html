<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="assets/img/icono.ico" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#1E6F5C',
              secondary: '#289672',
              accent: '#29BB89',
              light: '#E6DD3B',
              dark: '#1A5653'
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="./css/style.css" />
    <title>Mi Perfil - NaturalCiencia</title>
  </head>
  <body class="bg-gray-50 font-sans">
    <header class="bg-gradient-to-r from-primary to-secondary text-white shadow-lg">
      <div class="container mx-auto px-4 py-6 flex flex-col md:flex-row items-center justify-between">
        <div class="flex items-center mb-4 md:mb-0">
          <div>
          <h1 class="text-2xl font-bold"> <a href="index.html#inicio" class="hover:text-light transition-colors">NaturalCiencia</a></h1>
          </div>
        </div>
        <nav class="flex gap-6 items-center">
          <a href="index.html#inicio" class="hover:text-light transition-colors">Inicio</a>
          <a href="index.html#cursos" class="hover:text-light transition-colors">Juegos</a>
          <a href="index.html#recursos" class="hover:text-light transition-colors">Recursos</a>
          <a href="index.html#contacto" class="hover:text-light transition-colors">Contacto</a>
          <a href="index.html#desarrolladores" class="hover:text-light transition-colors">Desarrollador</a>
          <div id="nav-auth" class="flex items-center gap-3">
            <a href="login.html" id="login-link" class="px-4 py-2 rounded-md border border-white text-white hover:bg-white/10 transition-colors">Iniciar sesión</a>
            <a href="registro.html" id="register-link" class="px-4 py-2 rounded-md bg-white text-primary font-semibold hover:opacity-90 transition-colors">Registrarse</a>
          </div>
          <div id="nav-user" class="hidden items-center gap-3"></div>
        </nav>
      </div>
    </header>

    <main class="py-16">
      <div class="container mx-auto px-4 max-w-2xl">
        <div class="bg-white p-8 rounded-lg shadow-lg transition-transform transform hover:-translate-y-1">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-start">
            <div class="col-span-1 flex flex-col items-center">
              <div id="profile-avatar" class="w-36 h-36 rounded-full bg-gray-50 flex items-center justify-center text-3xl font-bold text-gray-700 overflow-hidden shadow-md mb-4 border border-gray-100">
                <!-- Avatar o imagen de carnet -->
              </div>
              <div id="profile-status" class="mt-2 text-sm font-medium text-muted"></div>
              <!-- Placeholder para mostrar notas/materias (será actualizado por js/app.js) -->
              <div id="profile-materias" class="mt-2 text-sm text-gray-700"><strong>Física:</strong> -</div>
            </div>

            <div class="md:col-span-2">
              <h2 class="text-2xl font-extrabold text-primary mb-2">Mi perfil</h2>
              <p class="text-gray-600 mb-4">Completa tus datos para desbloquear todas las funciones.</p>

              <div id="profile-logged-out" class="mb-4">Por favor inicia sesión para editar tu perfil.</div>

              <form id="profile-form" class="space-y-4 hidden">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div>
                    <label class="block text-gray-700 mb-2">Nombre</label>
                    <input type="text" id="profile-nombre" class="form-input w-full px-4 py-2 border border-gray-200 rounded-lg">
                  </div>
                  <div>
                    <label class="block text-gray-700 mb-2">Apellido</label>
                    <input type="text" id="profile-apellido" class="form-input w-full px-4 py-2 border border-gray-200 rounded-lg">
                  </div>
                </div>

                <div>
                  <label class="block text-gray-700 mb-2">Institución</label>
                  <input type="text" id="profile-institucion" class="form-input w-full px-4 py-2 border border-gray-200 rounded-lg">
                </div>

                <div>
                  <label class="block text-gray-700 mb-2">Correo</label>
                  <input type="email" id="profile-email" class="form-input w-full px-4 py-2 border border-gray-200 rounded-lg" disabled>
                </div>

                <div>
                  <label class="block text-gray-700 mb-2">Foto del carnet</label>
                  <input type="file" id="profile-carnet" accept="image/*">
                  <div id="profile-carnet-preview" class="mt-2"></div>
                </div>

                <div class="flex gap-3 mt-4">
                  <button id="save-profile" type="button" class="btn btn-primary">Guardar perfil</button>
                  <button id="logout-btn" type="button" class="btn btn-ghost">Cerrar sesión</button>
                </div>
              </form>
              <!-- Match history -->
              <div id="matches-section" class="mt-8 hidden">
                <h3 class="text-xl font-semibold mb-3">Historial de partidas (Cañón)</h3>
                <div id="matches-list" class="space-y-2">
                  <!-- Loaded dynamically -->
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-dark text-white py-8 mt-12">
      <div class="container mx-auto px-4 text-center text-gray-300">&copy; NaturalCiencia</div>
    </footer>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
